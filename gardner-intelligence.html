<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест множественных интеллектов Гарднера</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #0d9488;
      --primary-light: #f0fdfa;
      --primary-dark: #0f766e;
      --text: #1e293b;
      --muted: #64748b;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --success: #16a34a;
      --radius: 14px;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      background: var(--primary);
      color: white;
      padding: 20px 16px 14px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 8px rgb(13 148 136 / 0.3);
    }
    .header-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
    .header h1 { font-size: 1rem; font-weight: 700; line-height: 1.3; }
    .header-meta { font-size: 0.75rem; opacity: 0.75; white-space: nowrap; }
    .progress-row { display: flex; align-items: center; gap: 10px; }
    .progress-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.25); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: white; border-radius: 3px; transition: width 0.35s ease; width: 0%; }
    .progress-label { font-size: 0.7rem; opacity: 0.9; white-space: nowrap; min-width: 52px; text-align: right; }

    /* ── INSTRUCTION ── */
    .instruction {
      margin: 16px 16px 8px;
      padding: 14px 16px;
      background: var(--primary-light);
      border-left: 3px solid var(--primary);
      border-radius: 10px;
      font-size: 0.875rem;
      line-height: 1.65;
      color: var(--text);
    }

    /* ── QUESTIONS ── */
    .questions { padding: 8px 16px 140px; display: flex; flex-direction: column; gap: 10px; }

    .q-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 1px 3px rgb(0 0 0 / 0.06);
      transition: border-color 0.2s, background 0.2s;
    }
    .q-card.answered { border-color: var(--primary); background: #f0fdfa; }

    .q-num {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .q-text {
      font-size: 0.92rem;
      line-height: 1.55;
      margin-bottom: 14px;
      color: var(--text);
    }

    /* ── LIKERT SCALE ── */
    .likert {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .likert-btn {
      flex: 1;
      max-width: 64px;
      aspect-ratio: 1;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: white;
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
    }
    .likert-btn:hover { border-color: var(--primary); color: var(--primary); }
    .likert-btn.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      transform: scale(1.08);
      box-shadow: 0 2px 8px rgb(13 148 136 / 0.3);
    }

    .likert-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      padding: 0 4px;
    }
    .likert-labels span {
      font-size: 0.65rem;
      color: var(--muted);
      max-width: 80px;
    }

    /* ── FOOTER ── */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: white;
      border-top: 1px solid var(--border);
      box-shadow: 0 -4px 16px rgb(0 0 0 / 0.08);
      z-index: 20;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .submit-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    .remaining-note {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .skip-link {
      display: block;
      text-align: center;
      font-size: 0.75rem;
      color: var(--primary);
      margin-top: 6px;
      cursor: pointer;
      text-decoration: underline;
    }

    /* ── RESULTS PAGE ── */
    .results-page {
      display: none;
      padding: 16px 16px 60px;
    }
    .results-page.visible { display: block; }

    .results-title {
      font-size: 1.4rem;
      font-weight: 800;
      text-align: center;
      margin: 20px 0 8px;
      color: var(--text);
    }
    .results-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 28px;
    }

    .chart-section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }
    .chart-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .bar-label {
      font-size: 0.78rem;
      font-weight: 600;
      min-width: 130px;
      color: var(--text);
    }
    .bar-track {
      flex: 1;
      height: 22px;
      background: #f1f5f9;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      width: 0%;
    }
    .bar-score {
      font-size: 0.75rem;
      font-weight: 700;
      min-width: 32px;
      text-align: right;
      color: var(--text);
    }
    .bar-level {
      font-size: 0.6rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      min-width: 52px;
      text-align: center;
      color: white;
    }

    /* ── TOP TYPES CARDS ── */
    .top-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .top-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .top-rank {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      color: white;
    }
    .top-name { font-size: 1rem; font-weight: 700; }
    .top-score { font-size: 0.85rem; color: var(--muted); margin-left: auto; font-weight: 600; }
    .top-desc {
      font-size: 0.82rem;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .top-professions {
      font-size: 0.78rem;
      line-height: 1.5;
      color: var(--text);
    }
    .top-professions strong { font-weight: 700; }

    /* ── SUBSCALE CARDS ── */
    .subscale-section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .subscale-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .subscale-label {
      font-size: 0.75rem;
      min-width: 140px;
      color: var(--muted);
    }
    .subscale-track {
      flex: 1;
      height: 14px;
      background: #f1f5f9;
      border-radius: 4px;
      overflow: hidden;
    }
    .subscale-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .subscale-score {
      font-size: 0.7rem;
      font-weight: 600;
      min-width: 24px;
      text-align: right;
    }

    /* ── EXPORT ── */
    .export-section {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .export-title {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .export-desc {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .export-box {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.72rem;
      color: var(--text);
      line-height: 1.7;
      word-break: break-all;
      margin-bottom: 14px;
      max-height: 100px;
      overflow-y: auto;
      user-select: all;
    }
    .copy-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .copy-btn.copied { background: var(--success); }
    .copy-hint {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
      line-height: 1.5;
    }

    /* ── PROFILE TYPE BADGE ── */
    .profile-badge {
      text-align: center;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: var(--radius);
      color: white;
      margin-bottom: 20px;
    }
    .profile-badge-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 6px;
    }
    .profile-badge-type {
      font-size: 1.15rem;
      font-weight: 800;
    }
    .profile-badge-desc {
      font-size: 0.8rem;
      opacity: 0.85;
      margin-top: 4px;
    }

    /* ── RESPONSIVE ── */
    @media (min-width: 640px) {
      .questions, .results-page { max-width: 600px; margin-left: auto; margin-right: auto; }
      .instruction { max-width: 600px; margin-left: auto; margin-right: auto; }
      .likert-btn { max-width: 72px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <h1>Множественные интеллекты</h1>
    <span class="header-meta">80 вопросов · ~15 мин</span>
  </div>
  <div class="progress-row">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 80</div>
  </div>
</header>

<div class="instruction" id="instructionBlock">
  Оцените, насколько каждое утверждение соответствует вам, по шкале от <strong>1</strong> (совсем не про меня) до <strong>5</strong> (точно про меня). Отвечайте честно — правильных и неправильных ответов нет. Первый отклик обычно самый точный.
</div>

<div class="questions" id="questions"></div>

<div class="footer" id="footerBar">
  <button class="submit-btn" id="submitBtn" disabled>Завершить тест</button>
  <div class="remaining-note" id="remainingNote">Осталось: <strong id="remainingCount">80</strong></div>
  <span class="skip-link" id="skipLink" style="display:none;" onclick="scrollToUnanswered()">Перейти к пропущенному</span>
</div>

<div class="results-page" id="resultsPage"></div>

const answers = new Array(TOTAL).fill(null);

// ── Render questions ──
function render() {
  const container = document.getElementById('questions');
  QUESTIONS.forEach((text, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q${i}`;
    card.innerHTML = `
      <div class="q-num">Вопрос ${i + 1} из ${TOTAL}</div>
      <div class="q-text">${text}</div>
      <div class="likert">
        ${[1,2,3,4,5].map(v =>
          `<button class="likert-btn" onclick="pick(${i},${v})">${v}</button>`
        ).join('')}
      </div>
      <div class="likert-labels">
        <span>Не согласен</span>
        <span style="text-align:right">Согласен</span>
      </div>`;
    container.appendChild(card);
  });
}

// ── Pick answer ──
function pick(idx, value) {
  answers[idx] = value;
  const card = document.getElementById(`q${idx}`);
  card.classList.add('answered');
  card.querySelectorAll('.likert-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === value - 1);
  });
  updateUI();
}

// ── Update progress ──
function updateUI() {
  const done = answers.filter(a => a !== null).length;
  const remaining = TOTAL - done;
  const pct = (done / TOTAL * 100).toFixed(1);

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${TOTAL}`;
  document.getElementById('remainingCount').textContent = remaining;

  const btn = document.getElementById('submitBtn');
  const note = document.getElementById('remainingNote');
  const skip = document.getElementById('skipLink');
  btn.disabled = done < TOTAL;
  note.style.visibility = done < TOTAL ? 'visible' : 'hidden';
  skip.style.display = (done > 0 && done < TOTAL) ? 'block' : 'none';
}

// ── Scroll to first unanswered ──
function scrollToUnanswered() {
  const idx = answers.findIndex(a => a === null);
  if (idx >= 0) {
    document.getElementById(`q${idx}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// ── Calculate scores ──
function calculate() {
  const results = {};
  for (const [key, scale] of Object.entries(SCALES)) {
    let total = 0;
    let subA = 0, subB = 0;

    // Direct items
    for (const qNum of scale.direct) {
      total += answers[qNum - 1];
    }

    // Reverse items
    for (const qNum of scale.reverse) {
      total += (6 - answers[qNum - 1]);
    }

    // Subscales (direct items only)
    for (const qNum of scale.subA.items) {
      subA += answers[qNum - 1];
    }
    for (const qNum of scale.subB.items) {
      subB += answers[qNum - 1];
    }

    results[key] = { total, subA, subB };
  }
  return results;
}

function getLevel(score) {
  if (score >= 45) return { label: "Высокий", color: "#16a34a" };
  if (score >= 38) return { label: "Выше среднего", color: "#0d9488" };
  if (score >= 31) return { label: "Средний", color: "#6366f1" };
  if (score >= 21) return { label: "Ниже среднего", color: "#f59e0b" };
  return { label: "Низкий", color: "#ef4444" };
}

function getProfileType(results) {
  const sorted = Object.entries(results).sort((a, b) => b[1].total - a[1].total);
  const top = sorted[0][1].total;
  const bottom = sorted[7][1].total;
  const spread = top - bottom;

  const highCount = sorted.filter(([,v]) => v.total >= 38).length;

  if (spread <= 8) return { type: "Мультипотенциал", desc: "Гибкий профиль с равномерным развитием" };
  if (highCount <= 1) return { type: "Пиковый профиль", desc: "Ярко выраженная специализация" };
  if (highCount === 2) return { type: "Двухвершинный", desc: "Уникальная комбинация двух сильных сторон" };
  if (highCount >= 4) return { type: "Широкий профиль", desc: "Много развитых интеллектов, богатый ресурс" };
  return { type: "Контрастный", desc: "Выраженные сильные стороны и чёткие предпочтения" };
}

// ── Build export ──
function buildExport() {
  const today = new Date().toISOString().slice(0, 10);
  const pairs = answers.map((a, i) => `${i + 1}:${a}`).join(' ');
  return `ТЕСТ: gardner-intelligence\nДАТА: ${today}\n${pairs}`;
}

// ── Show results ──
function showResults() {
  const results = calculate();
  const sorted = Object.entries(results)
    .map(([key, val]) => ({ key, ...val, scale: SCALES[key] }))
    .sort((a, b) => b.total - a.total);

  const profile = getProfileType(results);

  const page = document.getElementById('resultsPage');

  // Profile badge
  let html = `
    <div class="results-title">Ваш профиль интеллектов</div>
    <div class="results-subtitle">Теория множественных интеллектов Говарда Гарднера</div>

    <div class="profile-badge">
      <div class="profile-badge-label">Тип профиля</div>
      <div class="profile-badge-type">${profile.type}</div>
      <div class="profile-badge-desc">${profile.desc}</div>
    </div>
  `;

  // Bar chart
  html += `<div class="chart-section"><div class="chart-title">Профиль интеллектов</div>`;
  sorted.forEach(item => {
    const pct = ((item.total - 10) / 40 * 100).toFixed(0);
    const level = getLevel(item.total);
    html += `
      <div class="bar-row">
        <div class="bar-label">${item.scale.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%; background:${item.scale.color}"></div>
        </div>
        <div class="bar-score">${item.total}</div>
        <div class="bar-level" style="background:${level.color}">${level.label}</div>
      </div>`;
  });
  html += `</div>`;

  // Top 3 cards
  html += `<div class="chart-section"><div class="chart-title">Ваши ведущие интеллекты</div>`;
  sorted.slice(0, 3).forEach((item, i) => {
    html += `
      <div class="top-card">
        <div class="top-card-header">
          <div class="top-rank" style="background:${item.scale.color}">${i + 1}</div>
          <div class="top-name">${item.scale.name}</div>
          <div class="top-score">${item.total} / 50</div>
        </div>
        <div class="top-desc">${item.scale.desc}</div>
        <div class="top-professions"><strong>Профессии:</strong> ${item.scale.professions}</div>
      </div>`;
  });
  html += `</div>`;

  // Subscales for top 3
  html += `<div class="subscale-section"><div class="chart-title">Детализация (подшкалы)</div>`;
  sorted.slice(0, 3).forEach(item => {
    const pctA = ((item.subA - 4) / 16 * 100).toFixed(0);
    const pctB = ((item.subB - 4) / 16 * 100).toFixed(0);
    html += `
      <div style="margin-bottom:14px">
        <div style="font-size:0.82rem;font-weight:700;margin-bottom:8px;color:${item.scale.color}">${item.scale.name}</div>
        <div class="subscale-row">
          <div class="subscale-label">${item.scale.subA.name}</div>
          <div class="subscale-track">
            <div class="subscale-fill" style="width:${pctA}%;background:${item.scale.color}"></div>
          </div>
          <div class="subscale-score">${item.subA}/20</div>
        </div>
        <div class="subscale-row">
          <div class="subscale-label">${item.scale.subB.name}</div>
          <div class="subscale-track">
            <div class="subscale-fill" style="width:${pctB}%;background:${item.scale.color}80"></div>
          </div>
          <div class="subscale-score">${item.subB}/20</div>
        </div>
      </div>`;
  });
  html += `</div>`;

  // Export
  html += `
    <div class="export-section">
      <div class="chart-title">Отправьте результаты коучу</div>
      <div class="export-desc">Скопируйте текст ниже и отправьте коучу — в Telegram, WhatsApp или по email. Он проведёт глубокую интерпретацию вашего профиля.</div>
      <div class="export-box" id="exportBox">${buildExport()}</div>
      <button class="copy-btn" id="copyBtn">Скопировать результаты</button>
      <div class="copy-hint">После копирования отправьте текст своему коучу.</div>
    </div>`;

  page.innerHTML = html;
  page.classList.add('visible');

  // Hide test UI
  document.getElementById('questions').style.display = 'none';
  document.getElementById('instructionBlock').style.display = 'none';
  document.getElementById('footerBar').style.display = 'none';

  // Update header
  document.querySelector('.header h1').textContent = 'Результаты';
  document.querySelector('.header-meta').textContent = '';
  document.querySelector('.progress-fill').style.width = '100%';
  document.querySelector('.progress-label').textContent = 'Готово';

  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Animate bars after a short delay
  setTimeout(() => {
    page.querySelectorAll('.bar-fill, .subscale-fill').forEach(el => {
      el.style.width = el.style.width; // trigger reflow
    });
  }, 100);

  // Copy button
  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = document.getElementById('exportBox').textContent;
    const btn = document.getElementById('copyBtn');
    const markCopied = () => {
      btn.textContent = 'Скопировано!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Скопировать результаты'; btn.classList.remove('copied'); }, 3500);
    };
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(markCopied).catch(fallback);
    } else { fallback(); }
    function fallback() {
      const el = document.getElementById('exportBox');
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(range);
      try { document.execCommand('copy'); markCopied(); } catch(e) {}
      sel.removeAllRanges();
    }
  });
}

// ── Submit ──
document.getElementById('submitBtn').addEventListener('click', showResults);

render();
updateUI();
</script>
